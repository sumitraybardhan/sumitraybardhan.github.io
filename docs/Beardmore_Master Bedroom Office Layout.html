document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n<\u002Fhelmet>\n\n<div style=\"{{ rootStyle }}\">\n<div style=\"max-width:1160px; margin:0 auto; padding:44px 28px 96px; font-family:'Archivo',system-ui,sans-serif; color:#232220;\">\n\n  <!-- HEADER -->\n  <div style=\"border-bottom:2px solid #232220; padding-bottom:20px; margin-bottom:22px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.22em; color:#8a7f6a; margin-bottom:10px;\">LAYOUT STUDY · FITTING AN OFFICE INTO THE MASTER<\u002Fdiv>\n    <h1 style=\"font-size:38px; line-height:1.04; font-weight:800; margin:0 0 12px; letter-spacing:-0.01em; text-wrap:balance;\">Master Bedroom → Bedroom + Home Office<\u002Fh1>\n    <div style=\"display:flex; flex-wrap:wrap; gap:8px 22px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:#56514a;\">\n      <span><strong style=\"color:#232220;\">27′2″ × 13′1″<\u002Fstrong><\u002Fspan>\n      <span>≈ 356 sq ft<\u002Fspan>\n      <span>Bath / vanity / closet span the full width at one end<\u002Fspan>\n      <span>3 options<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- LEGEND -->\n  <div style=\"display:flex; flex-wrap:wrap; gap:18px 26px; align-items:center; padding:14px 18px; background:#fbfaf6; border:1px solid #ded7c8; border-radius:6px; margin-bottom:18px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:#56514a;\">\n    <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:18px; height:13px; background:#ece3d0; border:1px solid #c7b794; display:inline-block;\"><\u002Fspan>Existing — to remain<\u002Fspan>\n    <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:18px; height:13px; background:var(--accent,#4F6D8C); opacity:0.5; display:inline-block; border-radius:2px;\"><\u002Fspan>Office zone<\u002Fspan>\n    <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:18px; height:13px; background:#B26A4B; display:inline-block;\"><\u002Fspan>New wall (built)<\u002Fspan>\n    <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:18px; height:0; border-top:3px solid #5f8bb0; display:inline-block;\"><\u002Fspan>Window<\u002Fspan>\n    <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:18px; height:13px; background:var(--furn-fill,#fff); border:1.5px solid #232220; display:inline-block; border-radius:2px;\"><\u002Fspan>Furniture<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- EXISTING CONDITIONS -->\n  <p style=\"font-size:14.5px; line-height:1.6; color:#46423b; margin:0 0 34px; max-width:880px; text-wrap:pretty;\">\n    The bath/shower, vanity and walk-in closet span the full width at one end (in that order across the room) and stay untouched in every option. Three windows run along the long wall; the bedroom is entered just left of the suite. Plans below are drawn to scale — but they are reconstructed from listing photos, so <strong>verify all dimensions, window and door positions on site<\u002Fstrong> before building anything.\n  <\u002Fp>\n\n  <!-- ============ OPTION A ============ -->\n  <section style=\"background:#fbfaf6; border:1px solid #ded7c8; border-radius:8px; padding:24px 24px 28px; margin-bottom:30px;\">\n    <div style=\"display:flex; flex-wrap:wrap; align-items:baseline; gap:12px 16px; margin-bottom:6px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:0.18em; color:#8a7f6a;\">OPTION A<\u002Fspan>\n      <h2 style=\"font-size:24px; font-weight:700; margin:0; letter-spacing:-0.01em;\">Open Zoning<\u002Fh2>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; letter-spacing:0.08em; color:#fff; background:#5C7A5A; padding:4px 10px; border-radius:20px;\">NO CONSTRUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:14.5px; line-height:1.55; color:#46423b; margin:0 0 18px; max-width:760px;\">Office and bed share one open room, separated only by an area rug and a low nt-size=\"0.8\" fill=\"var(--accent,#4F6D8C)\" text-anchor=\"middle\" font-family=\"Archivo\" font-weight=\"700\">HOME OFFICE<\u002Ftext>\n        <!-- dims -->\n        <g stroke=\"#232220\" stroke-width=\"0.05\" fill=\"#232220\" font-size=\"0.62\">\n          <line x1=\"0\" y1=\"-1.5\" x2=\"27.2\" y2=\"-1.5\"><\u002Fline>\n          <line x1=\"0\" y1=\"-1.8\" x2=\"0\" y2=\"-1.2\"><\u002Fline>\n          <line x1=\"27.2\" y1=\"-1.8\" x2=\"27.2\" y2=\"-1.2\"><\u002Fline>\n          <rect x=\"11.3\" y=\"-2.15\" width=\"4.6\" height=\"1.1\" fill=\"#ffffff\" stroke=\"none\"><\u002Frect>\n          <text x=\"13.6\" y=\"-1.3\" text-anchor=\"middle\" stroke=\"none\">27′2″<\u002Ftext>\n          <line x1=\"-1.5\" y1=\"0\" x2=\"-1.5\" y2=\"13.1\"><\u002Fline>\n          <line x1=\"-1.8\" y1=\"0\" x2=\"-1.2\" y2=\"0\"><\u002Fline>\n          <line x1=\"-1.8\" y1=\"13.1\" x2=\"-1.2\" y2=\"13.1\"><\u002Fline>\n          <rect x=\"-2.1\" y=\"5.3\" width=\"1.2\" height=\"2.5\" fill=\"#ffffff\" stroke=\"none\"><\u002Frect>\n          <text x=\"-1.5\" y=\"6.55\" text-anchor=\"middle\" stroke=\"none\" transform=\"rotate(-90 -1.5 6.55)\">13′1″<\u002Ftext>\n        <\u002Fg>\n        <g font-size=\"0.55\" fill=\"#7c7259\">\n          <line x1=\"0\" y1=\"15.2\" x2=\"5\" y2=\"15.2\" stroke=\"#232220\" stroke-width=\"0.1\"><\u002Fline>\n          <line x1=\"0\" y1=\"14.9\" x2=\"0\" y2=\"15.5\" stroke=\"#232220\" stroke-width=\"0.1\"><\u002Fline>\n          <line x1=\"2.5\" y1=\"15\" x2=\"2.5\" y2=\"15.4\" stroke=\"#232220\" stroke-width=\"0.08\"><\u002Fline>\n          <line x1=\"5\" y1=\"14.9\" x2=\"5\" y2=\"15.5\" stroke=\"#232220\" stroke-width=\"0.1\"><\u002Fline>\n          <text x=\"0\" y=\"16.1\" text-anchor=\"start\">0<\u002Ftext>\n          <text x=\"5\" y=\"16.1\" text-anchor=\"end\">5 ft<\u002Ftext>\n          <path d=\"M29.6,-2.5 L30.1,-1 L29.1,-1 Z\" fill=\"#232220\" stroke=\"none\"><\u002Fpath>\n          <line x1=\"29.6\" y1=\"-1\" x2=\"29.6\" y2=\"0.4\" stroke=\"#232220\ 6423b; margin:0;\">No privacy or sound control for video calls; desk is visible from the bed.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ OPTION B ============ -->\n  <section style=\"background:#fbfaf6; border:1px solid #ded7c8; border-radius:8px; padding:24px 24px 28px; margin-bottom:30px;\">\n    <div style=\"display:flex; flex-wrap:wrap; align-items:baseline; gap:12px 16px; margin-bottom:6px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:0.18em; color:#8a7f6a;\">OPTION B<\u002Fspan>\n      <h2 style=\"font-size:24px; font-weight:700; margin:0; letter-spacing:-0.01em;\">Bookshelf Divider<\u002Fh2>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; letter-spacing:0.08em; color:#fff; background:#5C7A5A; padding:4px 10px; border-radius:20px;\">NO CONSTRUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:14.5px; line-height:1.55; color:#46423b; margin:0 0 18px; max-width:760px;\">A back-to-back bookcase run (≈8 ft) screens the office from the bed and doubles as the storage you need — while leaving a walk-through at the foot of the bed.<\u002Fp>\n\n    <div style=\"background:#fff; border:1px solid #e4ddce; border-radius:6px; padding:18px 20px 10px;\">\n      <svg viewBox=\"-3 -3 33.5 19.7\" style=\"width:100%; height:auto; display:block; font-family:'IBM Plex Mono',monospace;\">\n        <rect x=\"0\" y=\"0\" width=\"27.2\" height=\"13.1\" fill=\"#ffffff\"><\u002Frect>\n        <rect x=\"9.3\" y=\"0.4\" width=\"10.2\" height=\"12.3\" rx=\"0.3\" fill=\"var(--accent,#4F6D8C)\" opacity=\"0.07\"><\u002Frect>\n        <rect x=\"0\" y=\"0\" width=\"27.2\" height=\"13.1\" fill=\"none\" stroke=\"#232220\" stroke-width=\"0.32\"><\u002Frect>\n        <g stroke=\"#5f8bb0\" stroke-width=\"0.2\">\n          <line x1=\"3\" y1=\"0\" x2=\"6\" y2=\"0\"><\u002Fline>\n          <line x1=\"8.5\" y1=\"0\" x2=\"11.5\" y2=\"0\"><\u002Fline>\n
